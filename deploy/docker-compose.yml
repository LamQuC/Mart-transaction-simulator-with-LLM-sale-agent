version: '3.8'

services:
  db:
    image: postgres:15 
    container_name: aepe_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}     
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"           
    volumes:
      - aepe_pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512mb             

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aepe_qdrant
    ports:
      - "6333:6333"                 # Port cho Vector DB
    volumes:
      - aepe_qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512mb

volumes:
  aepe_pgdata:
  aepe_qdrant_data: